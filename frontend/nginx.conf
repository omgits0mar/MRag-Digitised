server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Must match UPLOAD_MAX_BYTES on the backend (100 MB default).
    client_max_body_size 100M;

    # Health probe against the backend proxy path — handy for debugging.
    location = /healthz {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # Proxy /api/* to the FastAPI service on the shared compose network.
    # The trailing slash on proxy_pass strips the /api prefix so the backend
    # sees its own route paths (/health, /ask-question, /upload, ...).
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # SPA fallback — react-router owns client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache hashed assets emitted by Vite.
    location /assets/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }
}
